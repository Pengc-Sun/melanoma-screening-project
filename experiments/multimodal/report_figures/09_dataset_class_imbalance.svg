<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:Arial,sans-serif;fill:#111827}.title{font-size:26px;font-weight:700}.subtitle{font-size:16px;fill:#4b5563}.section{font-size:20px;font-weight:700}.panel-title{font-size:19px;font-weight:700}.tick{font-size:13px;fill:#4b5563}.label{font-size:15px}.label-strong{font-size:18px;font-weight:700}.value{font-size:15px;font-weight:700}.metric{font-size:28px;font-weight:700}.metric-label{font-size:14px;fill:#4b5563}.note{font-size:18px;font-weight:700;fill:#991b1b}.grid{stroke:#e5e7eb;stroke-width:1}.axis{stroke:#d1d5db;stroke-width:1}</style>
<text class="title" x="60" y="48">ISIC2020 Class Distribution</text>
<text class="subtitle" x="60" y="76">The malignant class is rare, so AUC/PR-AUC and sensitivity are more informative than accuracy.</text>
<text class="label-strong" x="60" y="175">benign</text>
<rect x="210" y="130" width="620.0" height="70" fill="#2563eb" rx="5"/>
<text class="value" x="844.0" y="175">32,542 (98.24%)</text>
<text class="label-strong" x="60" y="265">malignant</text>
<rect x="210" y="220" width="11.1" height="70" fill="#dc2626" rx="5"/>
<text class="value" x="235.1" y="265">584 (1.76%)</text>
<text class="note" x="60" y="350">Imbalance ratio: benign : malignant = 55.7 : 1</text>
</svg>